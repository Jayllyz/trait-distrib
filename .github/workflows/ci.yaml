name: CI

on:
  push:
    branches: [ main ]
  pull_request:


env:
  FORCE_COLOR: 1
  CI: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Install uv & python
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: true
        save-cache: ${{ github.ref == 'refs/heads/main' }}

    - name: Install dependencies
      run: uv sync

    - uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
    - run: ruff format --check

    - name: Run type checking
      run: uv run ty check

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Build production image
      run: docker build --tag trait-distrib:ci .

    - name: Run Spark inference smoke test
      run: >-
        docker run --rm --entrypoint python trait-distrib:ci -c
        'import numpy as np;
        from postal_app.predictor import get_predictor;
        predictions = get_predictor("spark").predict(np.zeros((5, 28, 28), dtype=np.uint8));
        assert len(predictions) == 5;
        assert all(0 <= item.digit <= 9 and 0.0 <= item.confidence <= 1.0 for item in predictions)'
